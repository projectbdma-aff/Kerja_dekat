<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Detail Job</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>
<body>

  <!-- HEADER -->

  <div class="header">

    <h1>Detail Job</h1>

    <p>
      Cari pekerja terbaik
    </p>

  </div>

  <!-- JOB DETAIL -->

  <div
    class="container"
    id="jobDetailContainer"
  >

    <div class="loading-box">

      <div class="spinner"></div>

      <p>
        Loading job...
      </p>

    </div>

  </div>

  <!-- APPLICANTS -->

  <div
    class="container"
    id="jobApplicants"
  ></div>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js"></script>

  <script src="js/app.js"></script>

  <script>

    // =====================================
    // GET JOB ID
    // =====================================

    const jobId =
      localStorage.getItem(
        "selectedJobId"
      );

    // =====================================
    // LOAD JOB REALTIME
    // =====================================

    function loadJobDetail(){

      const container =
        document.getElementById(
          "jobDetailContainer"
        );

      if(!jobId){

        container.innerHTML = `

          <div class="card">

            <p>
              Job tidak ditemukan
            </p>

          </div>

        `;

        return;

      }

      // REALTIME JOB

      db.collection("jobs")

      .doc(jobId)

      .onSnapshot(async function(doc){

        // JOB NOT FOUND

        if(!doc.exists){

          container.innerHTML = `

            <div class="card">

              <p>
                Job tidak ditemukan
              </p>

            </div>

          `;

          return;

        }

        // JOB DATA

        const job =
          doc.data();

        // OWNER DATA

        const ownerDoc =
          await db.collection("users")

          .doc(job.userId)

          .get();

        const owner =
          ownerDoc.data();

        // BADGE

        let badge = "";

        if(owner.isPremium){

          badge = "🥇";

        }else if(owner.isVerified){

          badge = "✔️";

        }

        // RATING

        let ratingText =
          "Belum ada ulasan";

        if(owner.totalReviews > 0){

          ratingText = `
            ⭐ ${owner.averageRating}
            (${owner.totalReviews} ulasan)
          `;

        }

        // STATUS

        let statusText = `
          🟢 Masih Dibuka
        `;

        if(job.status === "closed"){

          statusText = `
            🔴 Sudah Dipilih
          `;

        }

        // UI

        container.innerHTML = `

          <div class="card">

            <h2>

              ${job.title}

            </h2>

            <br>

            <p>

              ${job.description}

            </p>

            <br>

            <p>

              📍 ${job.location}

            </p>

            <br>

            <p>

              💰 Rp${job.price}

            </p>

            <br>

            <p>

              👥 ${job.totalApplicants || 0}
              Pelamar

            </p>

            <br>

            <p>

              ${statusText}

            </p>

            <br>

            <hr>

            <br>

            <h3>

              Pembuat Job

            </h3>

            <br>

            <p>

              ${owner.name}

              ${badge}

            </p>

            <br>

            <p>

              ${ratingText}

            </p>

            <br>

            <p>

              💼 ${owner.category}

            </p>

            <br>

            ${
              job.status === "open"
              ?
              `

              <button
                class="btn"
                onclick="
                  applyJob(
                    '${jobId}',
                    '${job.userId}'
                  )
                "
              >

                Lamar Job

              </button>

              `
              :
              `
              <button
                class="btn disabled-btn"
              >

                Job Ditutup

              </button>
              `
            }

          </div>

        `;

        // LOAD APPLICANTS

        loadApplicants(jobId);

      });

    }

    // =====================================
    // APPLY JOB
    // =====================================

    function applyJob(jobId, ownerId){

      const user =
        auth.currentUser;

      if(!user){

        alert(
          "Harus login"
        );

        return;

      }

      // CEK MELAMAR SENDIRI

      if(user.uid === ownerId){

        alert(
          "Tidak bisa melamar job sendiri"
        );

        return;

      }

      // CEK SUDAH MELAMAR

      db.collection("applicants")

      .where(
        "jobId",
        "==",
        jobId
      )

      .where(
        "workerId",
        "==",
        user.uid
      )

      .get()

      .then(function(snapshot){

        if(!snapshot.empty){

          alert(
            "Kamu sudah melamar"
          );

          return;

        }

        // SAVE

        db.collection("applicants")

        .add({

          jobId: jobId,

          workerId: user.uid,

          ownerId: ownerId,

          createdAt:
            firebase.firestore
            .FieldValue
            .serverTimestamp()

        })

        .then(function(){

          updateApplicantCount(
            jobId
          );

          alert(
            "Berhasil melamar"
          );

        });

      });

    }

    // =====================================
    // UPDATE APPLICANT COUNT
    // =====================================

    function updateApplicantCount(jobId){

      db.collection("applicants")

      .where(
        "jobId",
        "==",
        jobId
      )

      .get()

      .then(function(snapshot){

        db.collection("jobs")

        .doc(jobId)

        .update({

          totalApplicants:
            snapshot.size

        });

      });

    }

    // =====================================
    // LOAD APPLICANTS
    // =====================================

    function loadApplicants(jobId){

      const container =
        document.getElementById(
          "jobApplicants"
        );

      const currentUser =
        auth.currentUser;

      db.collection("jobs")

      .doc(jobId)

      .get()

      .then(function(jobDoc){

        const job =
          jobDoc.data();

        // HANYA OWNER BISA LIHAT

        if(
          !currentUser ||
          currentUser.uid !== job.userId
        ){

          container.innerHTML = "";

          return;

        }

        // REALTIME APPLICANTS

        db.collection("applicants")

        .where(
          "jobId",
          "==",
          jobId
        )

        .onSnapshot(async function(snapshot){

          container.innerHTML = `

            <div class="section-title">

              Pelamar
              (${snapshot.size})

            </div>

          `;

          for(const doc of snapshot.docs){

            const apply =
              doc.data();

            const userDoc =
              await db.collection("users")

              .doc(apply.workerId)

              .get();

            const user =
              userDoc.data();

            // BADGE

            let badge = "";

            if(user.isPremium){

              badge = "🥇";

            }else if(
              user.isVerified
            ){

              badge = "✔️";

            }

            // RATING

            let ratingText =
              "Belum ada ulasan";

            if(
              user.totalReviews > 0
            ){

              ratingText = `
                ⭐ ${user.averageRating}
                (${user.totalReviews} ulasan)
              `;

            }

            container.innerHTML += `

              <div class="card">

                <h3>

                  ${user.name}

                  ${badge}

                </h3>

                <br>

                <p>

                  ${ratingText}

                </p>

                <br>

                <p>

                  💼 ${user.category}

                </p>

                <br>

                <button
                  class="btn"
                  onclick="
                    openWhatsApp(
                      '${user.whatsapp}'
                    )
                  "
                >

                  WhatsApp

                </button>

                <br><br>

                <button
                  class="btn green-btn"
                  onclick="
                    selectWorker(
                      '${jobId}',
                      '${user.uid}'
                    )
                  "
                >

                  Pilih Pelamar

                </button>

              </div>

            `;

          }

        });

      });

    }

    // =====================================
    // SELECT WORKER
    // =====================================

    function selectWorker(
      jobId,
      workerId
    ){

      db.collection("jobs")

      .doc(jobId)

      .update({

        status:
          "closed",

        selectedWorkerId:
          workerId

      })

      .then(function(){

        alert(
          "Pelamar dipilih"
        );

      });

    }

    // =====================================
    // WHATSAPP
    // =====================================

    function openWhatsApp(phone){

      window.open(

        "https://wa.me/" + phone,

        "_blank"

      );

    }

    // =====================================
    // START
    // =====================================

    loadJobDetail();

  </script>

</body>
</html>
