<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KerjaDekat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #222;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .logo {
      width: 90px;
      height: 90px;
      background: #16a34a;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 34px;
      font-weight: bold;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border-color: #16a34a;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: #16a34a;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .info {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }

    .loading {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top: 4px solid #16a34a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">

      <div class="logo">K</div>

      <h1>KerjaDekat</h1>

      <p class="subtitle">
        Cari kerja & bantuan sekitar dengan aman
      </p>

      <div class="input-group">
        <label>Nomor HP</label>
        <input
          type="text"
          id="phone"
          placeholder="08xxxxxxxxxx"
        />
      </div>

      <button class="btn" onclick="loginUser()">
        Masuk dengan OTP
      </button>

      <div class="loading" id="loading"></div>

      <p class="info">
        Dengan masuk, kamu menyetujui syarat dan ketentuan aplikasi.
      </p>

    </div>
  </div>

  <script>
    function loginUser() {
      const phone = document.getElementById('phone').value;
      const loading = document.getElementById('loading');

      if(phone === '') {
        alert('Masukkan nomor HP');
        return;
      }

      loading.style.display = 'block';

      setTimeout(() => {
        loading.style.display = 'none';
        alert('OTP berhasil dikirim ke ' + phone);
      }, 2000);
    }
  </script>

</body>
</html>
