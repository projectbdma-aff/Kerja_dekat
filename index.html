<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KerjaDekat - Masuk & Daftar</title>
    <!-- Hubungkan ke Google Fonts untuk Tipografi Modern -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --secondary: #3b82f6;
            --secondary-hover: #2563eb;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfeff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        .auth-container {
            background-color: #ffffff;
            padding: 40px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .brand-logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #dcfce7;
            color: var(--primary);
            width: 64px;
            height: 64px;
            border-radius: 18px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 28px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #1e293b;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            color: white;
        }

        .btn-primary {
            background-color: var(--primary);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--secondary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .switch-text {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .switch-text span {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .switch-text span:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <!-- Logo Inisial Aplikasi -->
    <div class="brand-logo-box">KD</div>

    <h1 id="auth-title">Masuk ke KerjaDekat</h1>
    <p class="subtitle" id="banner-sub">Temukan lowongan pekerjaan terdekat dengan mudah</p>
    
    <!-- Form Input Email -->
    <div class="input-group">
        <label class="input-label" for="auth-email">Alamat Email</label>
        <input type="email" id="auth-email" placeholder="contoh@email.com" required>
    </div>
    
    <!-- Form Input Kata Sandi -->
    <div class="input-group">
        <label class="input-label" for="auth-password">Kata Sandi</label>
        <input type="password" id="auth-password" placeholder="Minimal 6 karakter" required>
    </div>
    
    <!-- Tombol Submit -->
    <button id="btn-main" class="btn-primary">Masuk</button>
    
    <!-- Teks Alih Tampilan Form -->
    <p class="switch-text" id="switch-wrapper">
        Belum punya akun? <span id="switch-mode">Daftar sekarang</span>
    </p>
</div>

<!-- Menghubungkan ke berkas logika Firebase Anda -->
<script type="module" src="js/auth.js"></script>

</body>
</html>
