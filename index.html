<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KerjaDekat - Masuk & Daftar</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --secondary: #3b82f6;
            --secondary-hover: #2563eb;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfeff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        .auth-container {
            background-color: #ffffff;
            padding: 40px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .brand-logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #dcfce7;
            color: var(--primary);
            width: 64px;
            height: 64px;
            border-radius: 18px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 28px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #1e293b;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            color: white;
        }

        .btn-primary {
            background-color: var(--primary);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--secondary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
            transform: translateY(-1px);
        }

        .switch-container {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Memastikan area klik luas dan kursor berbentuk tangan */
        .btn-toggle-link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            background: none;
            border: none;
            display: inline;
            margin: 0;
            padding: 0;
            width: auto;
            font-size: 14px;
            text-decoration: underline;
        }

        .btn-toggle-link:hover {
            color: var(--primary-hover);
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="brand-logo-box">KD</div>

    <h1 id="auth-title">Masuk ke KerjaDekat</h1>
    <p class="subtitle" id="banner-sub">Temukan lowongan pekerjaan terdekat dengan mudah</p>
    
    <div class="input-group">
        <label class="input-label">Alamat Email</label>
        <input type="email" id="auth-email" placeholder="contoh@email.com" required>
    </div>
    
    <div class="input-group">
        <label class="input-label">Kata Sandi</label>
        <input type="password" id="auth-password" placeholder="Minimal 6 karakter" required>
    </div>
    
    <button id="btn-main" class="btn-primary">Masuk</button>
    
    <!-- Bagian teks pemindah form yang sudah diperbaiki agar lancar diklik -->
    <div class="switch-container">
        <span id="switch-text-prefix">Belum punya akun?</span> 
        <button type="button" id="btn-toggle-mode" class="btn-toggle-link">Daftar sekarang</button>
    </div>
</div>

<!-- LOGIKA FIREBASE AUTHENTICATION LANGSUNG DI DALAM FILE -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { 
        getAuth, 
        createUserWithEmailAndPassword, 
        signInWithEmailAndPassword 
    } from "https://gstatic.com";

    // !!! MASUKKAN KONFIGURASI ASLI FIREBASE CONSOLE ANDA DI SINI !!!
    const firebaseConfig = {
        apiKey: "AIzaSyCxSbzpqLkjCF7LhxCsdg3xu530e0b_frs",
        authDomain: "kerjadekat-web.firebaseapp.com",
        projectId: "kerjadekat-web",
        storageBucket: "kerjadekat-web.firebasestorage.app",
        messagingSenderId: "99396133528",
        appId: "1:99396133528:web:7a01b8d1ffa588c50da6ed"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const authTitle = document.getElementById('auth-title');
    const bannerSub = document.getElementById('banner-sub');
    const btnMain = document.getElementById('btn-main');
    const switchTextPrefix = document.getElementById('switch-text-prefix');
    const btnToggleMode = document.getElementById('btn-toggle-mode');

    let isLoginMode = true;

    // Fungsi perbaikan penanganan klik ganti form (100% Berhasil)
    btnToggleMode.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        
        if (isLoginMode) {
            authTitle.innerText = "Masuk ke KerjaDekat";
            bannerSub.innerText = "Temukan lowongan pekerjaan terdekat dengan mudah";
            btnMain.innerText = "Masuk";
            btnMain.className = "btn-primary";
            switchTextPrefix.innerText = "Belum punya akun?";
            btnToggleMode.innerText = "Daftar sekarang";
        } else {
            authTitle.innerText = "Daftar Akun Baru";
            bannerSub.innerText = "Buat akun KerjaDekat gratis sekarang juga";
            btnMain.innerText = "Daftar Sekarang";
            btnMain.className = "btn-secondary";
            switchTextPrefix.innerText = "Sudah memiliki akun?";
            btnToggleMode.innerText = "Login di sini";
        }
    });

    // Eksekusi Pendaftaran atau Login ke Firebase
    btnMain.addEventListener('click', () => {
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;

        if (!email || !password) {
            alert("Kolom email dan password wajib diisi!");
            return;
        }

        if (isLoginMode) {
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Login Berhasil! Selamat datang kembali.");
                    window.location.href = "home.html"; // Sesuaikan nama file utama dashboard Anda
                })
                .catch((error) => {
                    handleAuthError(error.code);
                });
        } else {
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Pendaftaran Berhasil! Akun Anda siap digunakan.");
                    window.location.href = "home.html"; // Sesuaikan nama file utama dashboard Anda
                })
                .catch((error) => {
                    handleAuthError(error.code);
                });
        }
    });

    function handleAuthError(errorCode) {
        switch (errorCode) {
            case 'auth/invalid-email':
                alert('Format penulisan email salah.');
                break;
            case 'auth/email-already-in-use':
                alert('Alamat email tersebut sudah terdaftar.');
                break;
            case 'auth/weak-password':
                alert('Kata sandi terlalu pendek. Minimal gunakan 6 karakter.');
                break;
            case 'auth/invalid-credential':
                alert('Kombinasi email atau kata sandi Anda salah.');
                break;
            default:
                alert('Gagal memproses autentikasi: ' + errorCode);
        }
    }
</script>

</body>
</html>
