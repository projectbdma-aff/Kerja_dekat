<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Daftar Akun</title>

  <link rel="stylesheet" href="css/style.css">

</head>
<body>

  <div class="header">

    <h1>Daftar Akun</h1>

    <p>Buat akun KerjaDekat</p>

  </div>

  <div class="container">

    <div class="card">

      <div class="section-title">
        Data Diri
      </div>

      <input
        type="text"
        id="registerName"
        placeholder="Nama lengkap"
      >

      <input
        type="email"
        id="registerEmail"
        placeholder="Email"
      >

      <input
        type="password"
        id="registerPassword"
        placeholder="Password"
      >

      <input
        type="tel"
        id="registerPhone"
        placeholder="Nomor HP"
      >

      <input
        type="text"
        id="registerLocation"
        placeholder="Lokasi / Alamat"
      >

      <select
  id="category"
  onchange="toggleCustomCategory()"
>

  <option value="">
    Pilih kategori
  </option>

  <option value="Umum">
    Umum
  </option>

  <option value="Cleaning">
    Cleaning
  </option>

  <option value="Teknisi">
    Teknisi
  </option>

  <option value="Programmer">
    Programmer
  </option>

  <option value="Design Grafis">
    Design Grafis
  </option>

  <option value="Driver">
    Driver
  </option>

  <option value="Service AC">
    Service AC
  </option>

  <option value="Custom">
    Custom
  </option>

</select>

      <input
  type="text"
  id="customCategory"
  placeholder="Tulis kategori sendiri"
  style="display:none;"
>

      <button
        class="btn"
        onclick="registerUser()"
      >
        Daftar Sekarang
      </button>

      <br><br>

      <button
        class="btn"
        onclick="goTo('index.html')"
      >
        Sudah punya akun
      </button>

    </div>

  </div>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js"></script>

  <script src="js/app.js"></script>

</body>
</html>
