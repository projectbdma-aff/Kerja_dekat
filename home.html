<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Home</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>
<body>

  <!-- ===================================== -->
  <!-- SIDEBAR -->
  <!-- ===================================== -->

  <div id="sidebar" class="sidebar">

    <!-- HEADER -->

    <div class="sidebar-header">

      <h2>Menu</h2>

      <span
        class="close-btn"
        onclick="closeSidebar()"
      >

        ✖

      </span>

    </div>

    <!-- MENU -->

    <a href="home.html">

      🏠 Home

    </a>

    <a href="create-job.html">

      ➕ Buat Job

    </a>

    <a href="search.html">

      🔍 Cari Job

    </a>

    <a href="profile.html">

      👤 Profile

    </a>

    <a
      href="#"
      onclick="logoutUser()"
    >

      🚪 Logout

    </a>

  </div>

  <!-- ===================================== -->
  <!-- TOPBAR -->
  <!-- ===================================== -->

  <div class="topbar">

    <!-- MENU BUTTON -->

    <span
      class="menu-btn"
      onclick="openSidebar()"
    >

      ☰

    </span>

    <h1>

      Job Sekitar

    </h1>

  </div>

  <!-- ===================================== -->
  <!-- HEADER -->
  <!-- ===================================== -->

  <div class="header">

    <h2>

      Cari Bantuan & Pekerjaan

    </h2>

    <p>

      Temukan pekerjaan lokal sekitar kamu

    </p>

  </div>

  <!-- ===================================== -->
  <!-- SEARCH -->
  <!-- ===================================== -->

  <div class="container">

    <input
      type="text"
      id="searchInput"
      placeholder="Cari job..."
      onkeyup="searchJobs()"
    >

  </div>

  <!-- ===================================== -->
  <!-- JOBS -->
  <!-- ===================================== -->

  <div
    class="container"
    id="jobsContainer"
  >

    <!-- LOADING -->

    <div class="loading-box">

      <div class="spinner"></div>

      <p>

        Loading jobs...

      </p>

    </div>

  </div>

  <!-- ===================================== -->
  <!-- ADS -->
  <!-- ===================================== -->

  <div class="ads-banner">

    Iklan 320x50

  </div>

  <!-- ===================================== -->
  <!-- FIREBASE -->
  <!-- ===================================== -->

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- FIREBASE CONFIG -->

  <script src="js/firebase.js"></script>

  <!-- APP -->

  <script src="js/app.js"></script>

  <!-- ===================================== -->
  <!-- HOME SCRIPT -->
  <!-- ===================================== -->

  <script>

    // =====================================
    // LOAD JOBS REALTIME
    // =====================================

    function loadJobs(){

      const container =
        document.getElementById(
          "jobsContainer"
        );

      db.collection("jobs")

      .orderBy(
        "createdAt",
        "desc"
      )

      .onSnapshot(async function(snapshot){

        // EMPTY

        if(snapshot.empty){

          container.innerHTML = `

            <div class="card">

              <p>

                Belum ada job

              </p>

            </div>

          `;

          return;

        }

        // RESET

        container.innerHTML = "";

        // LOOP JOBS

        for(const doc of snapshot.docs){

          const job =
            doc.data();

          const jobId =
            doc.id;

          // USER

          const userDoc =
            await db.collection("users")

            .doc(job.userId)

            .get();

          const user =
            userDoc.data();

          // BADGE

          let badge = "";

          if(user.isPremium){

            badge = "🥇";

          }else if(
            user.isVerified
          ){

            badge = "✔️";

          }

          // RATING

          let ratingText =
            "Belum ada ulasan";

          if(
            user.totalReviews > 0
          ){

            ratingText = `
              ⭐ ${user.averageRating}
              (${user.totalReviews})
            `;

          }

          // STATUS

          let statusText = `
            🟢 Masih Dibuka
          `;

          if(job.status === "closed"){

            statusText = `
              🔴 Sudah Dipilih
            `;

          }

          // JOB CARD

          container.innerHTML += `

            <div class="card job-card">

              <h2>

                ${job.title}

              </h2>

              <br>

              <p>

                ${job.description}

              </p>

              <br>

              <p>

                📍 ${job.location}

              </p>

              <br>

              <p>

                💰 Rp${job.price}

              </p>

              <br>

              <p>

                👥
                ${job.totalApplicants || 0}
                Pelamar

              </p>

              <br>

              <p>

                ${statusText}

              </p>

              <br>

              <hr>

              <br>

              <p>

                ${user.name}

                ${badge}

              </p>

              <br>

              <p>

                ${ratingText}

              </p>

              <br>

              <button
                class="btn"
                onclick="
                  openDetailJob(
                    '${jobId}'
                  )
                "
              >

                Lihat Detail

              </button>

            </div>

          `;

        }

      });

    }

    // =====================================
    // OPEN DETAIL JOB
    // =====================================

    function openDetailJob(jobId){

      localStorage.setItem(
        "selectedJobId",
        jobId
      );

      location.href =
        "detail-job.html";

    }

    // =====================================
    // SEARCH JOB
    // =====================================

    function searchJobs(){

      const input =
        document.getElementById(
          "searchInput"
        ).value.toLowerCase();

      const cards =
        document.querySelectorAll(
          ".job-card"
        );

      cards.forEach(function(card){

        const text =
          card.innerText.toLowerCase();

        if(
          text.includes(input)
        ){

          card.style.display =
            "block";

        }else{

          card.style.display =
            "none";

        }

      });

    }

    // =====================================
    // START
    // =====================================

    loadJobs();

  </script>


  <!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/app.js"></script>

</body>
</html>
