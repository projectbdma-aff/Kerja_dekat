  <!-- ===================================== -->
  <!-- HOME SCRIPT -->
  <!-- ===================================== -->

  <script>

    // =====================================
    // LOAD JOBS REALTIME
    // =====================================
function loadJobs(){

  const jobsContainer =
    document.getElementById(
      "jobsContainer"
    );

  jobsContainer.innerHTML = `

    <div class="loading-box">

      <div class="spinner"></div>

    </div>

  `;

  db.collection("jobs")

  .orderBy(
    "createdAt",
    "desc"
  )

  .onSnapshot((snapshot)=>{

    jobsContainer.innerHTML = "";

    if(snapshot.empty){

      jobsContainer.innerHTML = `

        <p
          style="
            text-align:center;
            padding:30px;
          "
        >

          Belum ada job

        </p>

      `;

      return;

    }

    snapshot.forEach((doc)=>{

      const job =
        doc.data();

      const jobId =
        doc.id;

      const user =
        job.userData || {};

      jobsContainer.innerHTML += `

        <div class="job-card">

          <!-- HEADER -->

          <div class="job-header">

            <div class="job-user">

              <img
                src="${
                  user.photoUrl ||
                  'https://i.imgur.com/6VBx3io.png'
                }"
                class="job-avatar"
              >

              <div>

                <div class="job-name">

                  ${
                    user.name ||
                    "User"
                  }

                  ${
                    user.isPremium
                    ?
                    `
                    <span class="premium-badge">
                      🥇
                    </span>
                    `
                    :
                    user.isVerified
                    ?
                    `
                    <span class="verified-badge">
                      ✔️
                    </span>
                    `
                    :
                    ``
                  }

                </div>

              </div>

            </div>

            <!-- RATING -->

            <div class="job-rating">

              ${
                (user.totalReviews || 0) > 0
                ?
                `
                ⭐ ${
                  user.averageRating || 0
                }
                `
                :
                `
                Baru
                `
              }

            </div>

          </div>

          <!-- CONTENT -->

          <div class="job-content">

            <h2>

              ${job.title || "-"}

            </h2>

            <p>

              ${
                job.description || "-"
              }

            </p>

            <div class="job-meta">

              <span>

                📍 ${
                  job.location || "-"
                }

              </span>

              <span>

                💰 Rp${
                  job.price || 0
                }

              </span>

            </div>

          </div>

          <!-- FOOTER -->

          <div class="job-footer">

            <div>

              👥 ${
                job.totalApplicants || 0
              } Pelamar

            </div>

            <div>

              ${
                job.status === "closed"
                ?
                "🔴 Selesai"
                :
                "🟢 Aktif"
              }

            </div>

          </div>

          <!-- BUTTON -->

          <button
            class="btn"
            onclick="
              openDetailJob(
                '${jobId}'
              )
            "
          >

            Lihat Detail

          </button>

        </div>

      `;

    });

  });

}
    

          

          
    

    // =====================================
    // OPEN DETAIL JOB
    // =====================================

    function openDetailJob(jobId){

      localStorage.setItem(
        "selectedJobId",
        jobId
      );

      location.href =
        "detail-job.html";

    }

    // =====================================
    // SEARCH JOB
    // =====================================

    function searchJobs(){

      const input =
        document.getElementById(
          "searchInput"
        ).value.toLowerCase();

      const cards =
        document.querySelectorAll(
          ".job-card"
        );

      cards.forEach(function(card){

        const text =
          card.innerText.toLowerCase();

        if(
          text.includes(input)
        ){

          card.style.display =
            "block";

        }else{

          card.style.display =
            "none";

        }

      });

    }

    // =====================================
    // START
    // =====================================

    loadJobs();

  </script>
