<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cari Job</title>

  <link rel="stylesheet" href="css/style.css">

</head>
<body>

  <div class="header">

    <h1>Cari Job</h1>

    <p>Temukan pekerjaan sekitar</p>

  </div>

  <div class="container">

    <div class="card">

      <input
        type="text"
        placeholder="Cari pekerjaan..."
      >

      <select>

        <option>Semua Kategori</option>

        <option>Angkut Barang</option>

        <option>Bersih Rumah</option>

        <option>Kurir</option>

        <option>Servis</option>

      </select>

    </div>

    <!-- JOB -->

    <div class="job-card">

      <div class="job-title">
        Butuh bantu pindahan kos
      </div>

      <div class="job-price">
        Rp100.000
      </div>

      <div class="job-location">
        📍 Samarinda
      </div>

      <button
        class="btn"
        onclick="goTo('detail-job.html')"
      >
        Lihat Detail
      </button>

    </div>

    <div class="job-card">

      <div class="job-title">
        Cuci motor panggilan
      </div>

      <div class="job-price">
        Rp50.000
      </div>

      <div class="job-location">
        📍 Samarinda
      </div>

      <button
        class="btn"
        onclick="goTo('detail-job.html')"
      >
        Lihat Detail
      </button>

    </div>

  </div>

  <div class="bottom-nav">

    <div class="nav-item" onclick="goTo('home.html')">

      <div class="nav-icon">🏠</div>

      Home

    </div>

    <div class="nav-item active">

      <div class="nav-icon">🔎</div>

      Cari

    </div>

    <div class="nav-item" onclick="goTo('profile.html')">

      <div class="nav-icon">👤</div>

      Profil

    </div>

  </div>

  <script src="js/app.js"></script>

</body>
</html>
