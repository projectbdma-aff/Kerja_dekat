<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Profile</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>
<body>

  <div class="header">

    <h1>Profil Saya</h1>

    <p>Data diri pengguna</p>

  </div>

  <div class="container">

    <!-- PROFILE DATA -->

    <div id="profileData"></div>

    <br>

    <!-- EDIT PROFILE -->

    <div class="card">

      <div class="section-title">
        Edit Profil
      </div>

      <input
        type="text"
        id="editName"
        placeholder="Nama lengkap"
      >

      <input
        type="tel"
        id="editPhone"
        placeholder="Nomor HP"
      >

      <input
        type="text"
        id="editLocation"
        placeholder="Lokasi"
      >

      <input
        type="text"
        id="editCategory"
        placeholder="Kategori pekerjaan"
      >

      <input
        type="text"
        id="editPhoto"
        placeholder="Link foto profile (optional)"
      >

      <button
        class="btn"
        onclick="updateProfile()"
      >
        Simpan Profil
      </button>

      <br><br>

      <button
        class="btn logout-btn"
        onclick="logout()"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- BOTTOM NAV -->

  <div class="bottom-nav">

    <div
      class="nav-item"
      onclick="goTo('home.html')"
    >

      <div class="nav-icon">
        🏠
      </div>

      Home

    </div>

    <div
      class="nav-item"
      onclick="goTo('search.html')"
    >

      <div class="nav-icon">
        🔎
      </div>

      Cari

    </div>

    <div
      class="nav-item"
      onclick="goTo('chat.html')"
    >

      <div class="nav-icon">
        💬
      </div>

      Chat

    </div>

    <div class="nav-item active">

      <div class="nav-icon">
        👤
      </div>

      Profil

    </div>

  </div>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js"></script>

  <script src="js/app.js"></script>

</body>
</html>
